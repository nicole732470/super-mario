<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scene" id="scene">
    <button type="button" class="close-btn" id="close-btn" title="Quit (⌘⇧Q)" aria-label="Quit">×</button>
    <div class="tracks">
      <div class="track" id="plot-connect">
        <div class="stage">
          <div class="sky" aria-hidden="true">
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>
            <div class="cloud c3"></div>
          </div>
          <div class="hud">
            <div class="hud-left">
              <span class="hud-label">CONNECT</span>
              <span class="hud-period" id="period-connect">this week</span>
            </div>
            <em id="count-connect">0/100</em>
          </div>
          <div class="trail"><div class="trail-fill" id="trail-connect"></div></div>
          <div class="ground"></div>
          <div class="hero" id="hero-connect"></div>
          <div class="goal" id="goal-connect"></div>
        </div>
      </div>

      <div class="track" id="plot-apply">
        <div class="stage">
          <div class="sky" aria-hidden="true">
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>
            <div class="cloud c3"></div>
          </div>
          <div class="hud">
            <div class="hud-left">
              <span class="hud-label">APPLY</span>
              <span class="hud-period" id="period-apply">today</span>
            </div>
            <em id="count-apply">0/50</em>
          </div>
          <div class="trail"><div class="trail-fill" id="trail-apply"></div></div>
          <div class="ground"></div>
          <div class="hero" id="hero-apply"></div>
          <div class="goal" id="goal-apply"></div>
        </div>
      </div>
    </div>

    <div class="coach-wrap hidden" id="coach-wrap">
      <p class="coach" id="coach-main"></p>
    </div>

    <div class="fx-layer" id="fx-layer"></div>
    <div class="toast" id="toast"></div>
  </div>

  <script src="sprites.js"></script>
  <script src="coach.js"></script>
  <script src="sounds.js"></script>
  <script src="stats.js"></script>
  <script src="fx.js"></script>
  <script src="drag.js"></script>
  <script src="app.js"></script>
</body>
</html>
